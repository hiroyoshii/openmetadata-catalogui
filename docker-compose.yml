# OpenMetadata CRUD API 構成
#
# アクセス先: http://localhost:8585/api
#
# セットアップ:
#   1. docker compose up -d
#   2. python scripts/register_catalog.py
#   3. python scripts/register_lineage.py

x-om-env: &om-env
  DB_HOST: mysql
  DB_USER: openmetadata_user
  DB_USER_PASSWORD: openmetadata_password
  DB_PARAMS: allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
  SEARCH_TYPE: elasticsearch
  ELASTICSEARCH_HOST: elasticsearch
  ELASTICSEARCH_PORT: "9200"
  ELASTICSEARCH_SCHEME: http
  PIPELINE_SERVICE_CLIENT_ENABLED: "false"
  AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.NoopAuthorizer
  AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.NoopFilter

volumes: {}

services:

  elasticsearch:
    container_name: openmetadata_elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql:
    container_name: openmetadata_mysql
    image: docker.getcollate.io/openmetadata/db:1.6.2
    command: "--sort_buffer_size=10M"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
    healthcheck:
      test: mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --silent --execute "use openmetadata_db"
      interval: 15s
      timeout: 10s
      retries: 10

  execute-migrate-all:
    container_name: execute_migrate_all
    image: docker.getcollate.io/openmetadata/server:1.6.2
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      <<: *om-env
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  openmetadata-server:
    container_name: openmetadata_server
    image: docker.getcollate.io/openmetadata/server:1.6.2
    restart: always
    environment:
      <<: *om-env
    ports:
      - "8585:8585"
    depends_on:
      execute-migrate-all:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8585/api/v1/system/config/auth"]
      interval: 30s
      timeout: 10s
      retries: 10

  registrar:
    container_name: openmetadata_registrar
    image: python:3.11-slim
    working_dir: /scripts
    volumes:
      - ./scripts:/scripts:ro
    command: python run_registrar.py
    restart: always
    environment:
      OM_HOST: http://openmetadata-server:8585
      REGISTRAR_INTERVAL: "60"
    depends_on:
      openmetadata-server:
        condition: service_healthy
